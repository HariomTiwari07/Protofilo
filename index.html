<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hariom Tiwari | Android Developer</title>
    <meta name="description" content="Hariom Tiwari - Android Developer portfolio showcasing skills, projects, and experience">
    <link rel="icon" type="image/x-icon" href="#">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <style>
        :root {
            --color-dark-1: #0A0A1F;
            --color-dark-2: #161633;
            --color-primary: #8A4EF4;
            --color-primary-dark: #6C2BD9;
            --color-secondary: #E3D9FF;
            --color-text-light: #F0F0FF;
            --color-glow-primary: #9B6FFF;
            --color-shadow-light: rgba(138, 78, 244, 0.2);
            --font-family-base: 'Montserrat', sans-serif;
            --font-size-base: 1.1rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { scroll-behavior: smooth; }

        /* ========================================
           GALAXY BACKGROUND
           ======================================== */
        body {
            background: 
                /* Galaxy gradient overlay */
                radial-gradient(ellipse at 20% 50%, rgba(80, 30, 150, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(30, 60, 180, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(150, 50, 200, 0.2) 0%, transparent 50%),
                /* Deep space base */
                linear-gradient(180deg, #050510 0%, #0A0A2E 25%, #10082A 50%, #0A0A1F 75%, #050510 100%);
            color: var(--color-text-light);
            font-family: var(--font-family-base);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========================================
           GALAXY STARS - Layer 1 (Small)
           ======================================== */
        body::before {
            position: fixed;
            top: 0;
            left: 0;
            content: "";
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 20px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 30px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 50px 150px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 80px 40px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 120px 200px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 180px 60px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 220px 300px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 280px 90px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 350px 400px, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 400px 50px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 450px 250px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 500px 350px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 550px 100px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 600px 450px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 650px 200px, rgba(255,255,255,0.7), transparent);
            background-size: 700px 500px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        /* ========================================
           GALAXY STARS - Layer 2 (Medium)
           ======================================== */
        body::after {
            position: fixed;
            top: 0;
            left: 0;
            content: "";
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(3px 3px at 40px 120px, rgba(200,180,255,0.4), transparent),
                radial-gradient(3px 3px at 100px 280px, rgba(180,200,255,0.3), transparent),
                radial-gradient(2px 2px at 200px 450px, rgba(220,180,255,0.4), transparent),
                radial-gradient(3px 3px at 320px 180px, rgba(200,220,255,0.3), transparent),
                radial-gradient(2px 2px at 450px 380px, rgba(180,200,255,0.4), transparent),
                radial-gradient(3px 3px at 580px 250px, rgba(200,180,255,0.3), transparent),
                radial-gradient(2px 2px at 700px 420px, rgba(220,200,255,0.4), transparent);
            background-size: 800px 500px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: twinkle2 6s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        @keyframes twinkle2 {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        /* ========================================
           GALAXY SPIRAL - Animated
           ======================================== */
        .galaxy-spiral {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.08;
            animation: spiralRotate 60s linear infinite;
        }

        .galaxy-spiral::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(138, 78, 244, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(50, 100, 255, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 30%, rgba(200, 100, 255, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 70%, rgba(100, 50, 200, 0.15) 0%, transparent 40%);
            filter: blur(50px);
            border-radius: 50%;
        }

        .galaxy-spiral::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background: 
                conic-gradient(from 0deg, 
                    transparent 0deg, 
                    rgba(138,78,244,0.1) 30deg,
                    transparent 60deg,
                    rgba(50,100,255,0.1) 120deg,
                    transparent 180deg,
                    rgba(138,78,244,0.1) 240deg,
                    transparent 300deg,
                    rgba(50,100,255,0.1) 330deg,
                    transparent 360deg
                );
            border-radius: 50%;
            filter: blur(40px);
            animation: spin 20s linear infinite;
        }

        @keyframes spiralRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.05); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); }
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ========================================
           SHOOTING STARS
           ======================================== */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 4px 2px rgba(255, 255, 255, 0.4);
            z-index: 0;
            pointer-events: none;
            animation: shoot 8s linear infinite;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
            right: 2px;
        }

        .shooting-star:nth-child(1) {
            top: 10%;
            left: 80%;
            animation-delay: 0s;
        }

        .shooting-star:nth-child(2) {
            top: 20%;
            left: 60%;
            animation-delay: 3s;
        }

        .shooting-star:nth-child(3) {
            top: 30%;
            left: 90%;
            animation-delay: 6s;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-45deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                transform: translate(-400px, 400px) rotate(-45deg);
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }

        /* ========================================
           NEBULA GLOW - Floating Orbs
           ======================================== */
        .nebula-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }

        .nebula-orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(138, 78, 244, 0.08);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .nebula-orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(50, 100, 255, 0.06);
            bottom: -50px;
            left: -50px;
            animation-delay: -7s;
        }

        .nebula-orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(200, 100, 255, 0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        
        #threejs-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        #threejs-container canvas {
            display: block;
            pointer-events: auto;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1C1C40; }
        ::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #7138C4; }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .section-padding { padding: var(--spacing-lg) 0; }
        .text-center { text-align: center; }

        /* ========================================
           HEADER / NAVIGATION
           ======================================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(138, 78, 244, 0.08);
            transition: transform 0.3s ease;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 5%;
        }

        /* Logo Initials - Premium */
        .logo-initials {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #8A4EF4, #6C2BD9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 0 30px rgba(138, 78, 244, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .logo-initials:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 0 50px rgba(138, 78, 244, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .nav-list {
            display: none;
            list-style: none;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-item a {
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            font-size: 0.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-item a:hover {
            background: rgba(138, 78, 244, 0.15);
            color: var(--color-primary);
        }

        .nav-item a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .nav-item a:hover::after { width: 60%; }

        .menu-toggle {
            display: block;
            background: none;
            border: none;
            color: var(--color-text-light);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .menu-toggle:hover {
            background: rgba(138, 78, 244, 0.15);
        }

        /* ========================================
           HERO SECTION
           ======================================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }

        .hero__content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-lg);
            width: 100%;
            text-align: center;
            padding: 100px 0 50px 0;
        }

        .hero__content-block {
            padding: var(--spacing-lg);
            background: rgba(5, 5, 16, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: fadeIn 1.5s ease-out forwards;
            z-index: 1;
            position: relative;
            overflow: hidden;
        }

        .hero__content-block::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(138, 78, 244, 0.03) 0%, transparent 70%);
            animation: rotateGlow 30s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hero__greeting {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-secondary);
            margin-bottom: var(--spacing-sm);
            text-shadow: 0 0 30px var(--color-glow-primary);
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }

        .hero__title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #8A4EF4, #B88AFF, #6C2BD9);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            margin-bottom: var(--spacing-sm);
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero__subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--color-secondary);
            margin-bottom: var(--spacing-md);
            position: relative;
            z-index: 1;
            opacity: 0.9;
        }

        .hero__description {
            color: rgba(192, 192, 224, 0.85);
            max-width: 600px;
            position: relative;
            z-index: 1;
            line-height: 1.8;
        }

        .hero__image-container {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--color-primary);
            box-shadow: 0 0 40px rgba(138, 78, 244, 0.3);
            flex-shrink: 0;
            transition: all 0.5s ease;
            position: relative;
        }

        .hero__image-container::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--color-primary), transparent, var(--color-primary-dark), transparent);
            animation: spinBorder 4s linear infinite;
            z-index: -1;
        }

        @keyframes spinBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hero__image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hero Buttons */
        .hero__buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            padding: 14px 35px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 25px rgba(138, 78, 244, 0.3);
            font-size: 1rem;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 35px rgba(138, 78, 244, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            padding: 14px 35px;
            border-radius: 30px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            background: rgba(138, 78, 244, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 25px rgba(138, 78, 244, 0.1);
        }

        /* ========================================
           ANIMATIONS
           ======================================== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animation-slide-in-left {
            animation: slideInFromLeft 1.5s ease-out forwards;
        }

        .animation-slide-in-right {
            animation: slideInFromRight 1.5s ease-out forwards;
        }

        /* ========================================
           RESPONSIVE - HERO
           ======================================== */
        @media (min-width: 900px) {
            .nav-list { display: flex; }
            .menu-toggle { display: none; }

            .hero__content-wrapper {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                text-align: left;
            }

            .hero__content-block {
                flex: 1;
                margin-left: 20px;
            }
            .hero__content-block:nth-child(2) {
                margin-left: var(--spacing-lg);
                flex: 2;
            }

            .hero__image-container {
                width: 320px;
                height: 320px;
            }

            .hero__title { font-size: 5.5rem; }
            .hero__subtitle { font-size: 2rem; }
            
            .hero__buttons {
                justify-content: flex-start;
            }
        }

        /* ========================================
           ABOUT SECTION
           ======================================== */
        .about__heading {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8A4EF4, #B88AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-lg);
            position: relative;
            display: inline-block;
        }

        .about__heading::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
            border-radius: 3px;
        }

        .about__content-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
            align-items: center;
            text-align: center;
            background: rgba(5, 5, 16, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            padding: var(--spacing-lg);
            animation: fadeIn 1.5s ease-out forwards;
        }

        @media (min-width: 768px) {
            .about__content-container {
                flex-direction: row;
                text-align: left;
                align-items: flex-start;
            }
        }

        .about__text {
            flex: 1;
            font-size: var(--font-size-base);
            border: none;
            padding: 0;
            background: none;
            box-shadow: none;
            max-width: 700px;
        }

        .about__text p {
            margin-bottom: 1rem;
            color: rgba(200, 200, 232, 0.85);
            line-height: 1.8;
        }

        .about__image-container {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--color-primary);
            box-shadow: 0 0 40px rgba(138, 78, 244, 0.2);
            flex-shrink: 0;
            transition: all 0.4s ease;
        }

        .about__image-container:hover {
            transform: scale(1.03);
